<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线状态 - 878时讯</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .container {
      text-align: center;
      max-width: 400px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(218, 45, 45, 0.2);
    }
    h1 {
      color: #da2d2d;
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    .retry-btn {
      background: #da2d2d;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
      font-weight: 500;
    }
    .retry-btn:hover {
      background: #c02626;
    }
    .brand {
      margin-top: 30px;
      font-size: 14px;
      color: #999;
    }
    @media (max-width: 480px) {
      .container {
        margin: 20px;
        padding: 30px 20px;
      }
      .logo {
        width: 100px;
        height: 100px;
      }
      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/icons/icon-192.png" alt="AC878 Logo" class="logo" onerror="this.style.display='none'">
    <h1>您目前处于离线状态</h1>
    <p>请检查网络连接后重试</p>
    <button class="retry-btn" onclick="window.location.reload()">重新加载</button>
    <div class="brand">878时讯 | AC878 News</div>
  </div>

  <script>
    // Auto-retry when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Check connection status
    if (navigator.onLine) {
      document.querySelector('p').textContent = '正在尝试重新连接...';
      setTimeout(() => {
        window.location.reload();
      }, 2000);
    }
  </script>
</body>
</html>
